<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Der Hobbit - Premium Lern-App v1.2.6</title>
<style>
:root {
  --bg-dark: #0B3D0B;
  --card-dark: #001f3f;
  --gold: #ffd700;
  --text-white: #ffffff;
  --btn-blue: #001f3f; 
  --btn-green: #004d00;
}
body {
  font-family: 'Segoe UI', sans-serif;
  margin:0; padding:10px;
  background:var(--bg-dark);
  color:var(--text-white);
  display:flex; flex-direction:column;
  min-height:100vh; box-sizing:border-box;
}

#header-container { 
  display: grid;
  grid-template-columns: 60px 1fr 60px;
  align-items: center;
  text-align:center; 
  margin-bottom:8px; 
  border-bottom: 2px solid var(--gold);
  padding-bottom: 5px;
}
#start-nav-btn {
  background: var(--btn-blue);
  border: 1px solid var(--gold);
  color: var(--gold);
  border-radius: 8px;
  padding: 8px;
  font-weight: bold;
  cursor: pointer;
  font-size: 0.7rem;
}
#header-main { margin:0; font-size:1.4rem; color:var(--gold); font-weight: bold; grid-column: 2; }
#header-sub { font-size:0.8rem; color: var(--text-white); font-family: monospace; grid-column: 2; }
#header-version { font-size:0.65rem; color: var(--text-white); grid-column: 2; }

#categories { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; margin-bottom:8px; }
.category-btn {
  padding:5px 2px; font-size:0.7rem; font-weight:bold;
  background:var(--card-dark); color:var(--text-white);
  border-radius:6px; border:1px solid rgba(255,215,0,0.3);
  cursor:pointer; min-height:38px;
}

#card {
  flex:1; background:var(--card-dark); border-radius:20px;
  padding:15px; display:flex; flex-direction:column;
  justify-content:center; align-items:center; text-align:center;
  border:2px solid var(--gold);
  box-shadow:0 6px 15px rgba(0,0,0,0.4);
  margin-bottom:8px; overflow-y:auto; cursor: pointer;
}
.card-head { font-size:0.8rem; color:var(--gold); text-transform:uppercase; margin-bottom:5px; }
.element-name { font-size:1.4rem; font-weight:900; margin:5px 0; color:white; }
.meaning { font-size:0.85rem; line-height:1.4; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px; width:92%; text-align: left; }
#card-index { margin-top:8px; font-size:0.7rem; color:#cfcfc0; }

#nav { display:flex; gap:8px; margin-bottom:8px; }
.nav-btn {
  flex:1; padding:12px; font-size:0.9rem; font-weight:bold;
  border: 1px solid var(--gold); border-radius:12px; background: var(--btn-green);
  color:white; cursor:pointer;
}

.bottom-btn {
  padding:12px; width:100%; border:none; border-radius:12px;
  background:var(--gold); color:var(--bg-dark); font-size:1rem;
  font-weight:800; text-transform:uppercase; cursor:pointer;
}

#app-footer {
  text-align: center;
  font-size: 0.65rem;
  color: #cfcfc0;
  margin-top: 10px;
  padding: 5px;
}
</style>
</head>
<body>

<div id="header-container">
  <button id="start-nav-btn" onclick="goToStart()">HOME</button>
  <div id="header-main">Der Hobbit</div>
  <div id="header-sub">J.R.R. Tolkin</div>
  <div id="header-version">Version 1.2.6</div>
</div>

<div id="categories">
  <button class="category-btn" data-category="wissen">Wissen</button>
  <button class="category-btn" data-category="hauptfiguren">Hauptfiguren</button>
  <button class="category-btn" data-category="nebenfiguren">Nebenfiguren</button>
  <button class="category-btn" data-category="orte">Orte</button>
  <button class="category-btn" data-category="kreaturen">Kreaturen</button>
  <button class="category-btn" data-category="zitate">Zitate</button>
</div>

<div id="card">
  <div class="card-head" id="card-head">Willkommen</div>
  <div class="element-name" id="element-name">Lade Inhalte...</div>
  <div class="meaning" id="meaning">Bitte warten...</div>
  <div id="card-index"></div>
</div>

<div id="nav">
  <button class="nav-btn" id="prev-btn">◀ Zurück</button>
  <button class="nav-btn" id="read-btn">🔊 Hören</button>
  <button class="nav-btn" id="next-btn">Weiter ▶</button>
</div>

<button class="bottom-btn" id="explain-btn">HOBBIT PHILOSOPHIE</button>

<div id="app-footer">

</div>

let currentCategory="home";
let currentIndex=0;

function speak(text){
  window.speechSynthesis.cancel();
  const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
  const msg=new SpeechSynthesisUtterance(cleanText);
  msg.lang="de-DE";
  window.speechSynthesis.speak(msg);
}

function showCard(){
  const card = cards[currentCategory][currentIndex];
  let headText = currentCategory.toUpperCase();
  if(currentCategory === 'home') headText = 'WILLKOMMEN';
  if(currentCategory === 'hobbit_philosophie') headText = 'PHILOSOPHIE';
  
  document.getElementById("card-head").textContent = headText;
  document.getElementById("element-name").innerHTML = card.title;
  document.getElementById("meaning").innerHTML = card.content;
  document.getElementById("card-index").textContent = `${currentIndex+1} / ${cards[currentCategory].length}`;
  speak(card.title + ". " + card.content);
}

function goToStart() {
  currentCategory = "home";
  currentIndex = 0;
  showCard();
}

document.querySelectorAll(".category-btn").forEach(btn=>{
  btn.onclick=()=>{
    currentCategory=btn.dataset.category;
    currentIndex=0;
    showCard();
  };
});

document.getElementById("next-btn").onclick = (e) => {
  if(e) e.stopPropagation();
  currentIndex = (currentIndex + 1) % cards[currentCategory].length;
  showCard();
};

document.getElementById("prev-btn").onclick = (e) => {
  if(e) e.stopPropagation();
  currentIndex = (currentIndex - 1 + cards[currentCategory].length) % cards[currentCategory].length;
  showCard();
};

document.getElementById("read-btn").onclick = (e) => {
  e.stopPropagation();
  const card = cards[currentCategory][currentIndex];
  speak(card.title + ". " + card.content);
};

document.getElementById("card").onclick = () => document.getElementById("next-btn").click();

document.getElementById("explain-btn").onclick = () => {
  currentCategory = "hobbit_philosophie";
  currentIndex = 0;
  showCard();
};

// Initialer Start mit Home-Kategorie
showCard();
